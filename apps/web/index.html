<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FBFBFA" />

    <title>CarryMate — Send personal things across borders, carried by people you can trust</title>
    <meta
      name="description"
      content="CarryMate connects verified travelers with people who need to send personal items across borders — cheaper and faster than courier, with identity checks, flight verification, secure escrow and open-box declarations built into every step."
    />
    <meta name="keywords" content="cross-border delivery, peer to peer shipping, send package India to UAE, traveler delivery, crowdshipping, hand carry, escrow delivery" />
    <link rel="canonical" href="https://carrymate.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CarryMate" />
    <meta property="og:title" content="Send personal things across borders, carried by people you trust" />
    <meta property="og:description" content="A peer-to-peer way to move the things that matter — homemade food, documents, festival gifts — along routes travelers already fly. Trust engineered into every step." />
    <meta property="og:url" content="https://carrymate.app/" />
    <meta property="og:image" content="https://carrymate.app/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CarryMate — carried by people you can trust" />
    <meta name="twitter:description" content="Move personal items across borders along travelers' existing flights. Verified, escrow-protected, human." />

    <!-- Fonts: editorial serif display + geometric sans + mono meta -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "CarryMate",
        "url": "https://carrymate.app",
        "description": "Peer-to-peer cross-border luggage marketplace connecting verified travelers with senders of personal items.",
        "areaServed": ["India", "United Arab Emirates"],
        "sameAs": []
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      CarryMate is a peer-to-peer way to send personal items across borders, carried by verified
      travelers on flights they're already taking. Please enable JavaScript to view the site.
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
