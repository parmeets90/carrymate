services:
  postgres:
    image: postgres:15-alpine
    container_name: carrymate-postgres
    environment:
      POSTGRES_DB: carrymate
      POSTGRES_USER: carrymate_user
      POSTGRES_PASSWORD: local_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carrymate_user -d carrymate']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: carrymate-backend
    profiles: ['full']
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://carrymate_user:local_secret@postgres:5432/carrymate
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
