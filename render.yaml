# Render blueprint — CarryMate (backend API + admin static site).
# DB is Supabase (external); set DATABASE_URL/DIRECT_URL in the dashboard.
services:
  - type: web
    name: carrymate-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    # Free tier doesn't support preDeployCommand, so migrations run at the end of build.
    buildCommand: npm install && npm run shared:build && npm run db:generate && npm run backend:build && npm run migrate:deploy -w @carrymate/backend
    startCommand: npm run backend:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_VERSION
        value: 0.1.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: carrymate

  - type: web
    name: carrymate-admin
    runtime: static
    branch: main
    buildCommand: npm install && npm run shared:build && npm run admin:build
    staticPublishPath: apps/admin/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
